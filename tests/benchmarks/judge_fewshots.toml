# Per-rule few-shot exemplars for LLM judge v3 (deterministic, no registry labels).

[[example]]
rule_id = "SQLCOST012"
sql_excerpt = "SELECT t.id, u.id FROM t CROSS JOIN UNNEST(u.items) AS x(item)"
message = "Cross join detected without an explicit allow comment."
exemption_applies = true
failure_condition_met = false
verdict = "B"

