[[repo]]
name = "jaffle-shop"
url = "https://github.com/dbt-labs/jaffle-shop.git"
commit = "08ef1d578de5b55f226aae34f30d7077df8e9f35"
warehouse = "generic"
compile_dbt = true
dbt_adapter = "dbt-duckdb"
dbt_profile_type = "duckdb"
dbt_no_introspect = false
scan_paths = ["."]
fail_on = "critical"

[[repo]]
name = "spellbook"
url = "https://github.com/duneanalytics/spellbook.git"
commit = "e3a7dc9e8a49fa8a9a55d967fa8cabe5dd963738"
warehouse = "trino"
compile_dbt = true
dbt_adapter = "dbt-trino"
dbt_profile_type = "trino"
dbt_compile_dirs = [
  "dbt_subprojects/dex",
  "dbt_subprojects/tokens",
  "dbt_subprojects/solana",
  "dbt_subprojects/daily_spellbook",
  "dbt_subprojects/hourly_spellbook",
]
smoke_compile_dirs = ["dbt_subprojects/tokens"]
smoke_scan_paths = ["dbt_macros", "dbt_subprojects/tokens"]
scan_paths = [
  "dbt_macros",
  "dbt_subprojects/dex",
  "dbt_subprojects/solana",
  "dbt_subprojects/tokens",
  "dbt_subprojects/daily_spellbook",
  "dbt_subprojects/hourly_spellbook",
]
fail_on = "critical"
max_parse_failure_rate = 0.35
cost = true

[[repo]]
name = "nba-monte-carlo"
url = "https://github.com/matsonj/nba-monte-carlo.git"
commit = "494dbe6a1f0adec64b4557014c3995c1f0f7f7af"
warehouse = "duckdb"
compile_dbt = true
compile_best_effort = true
dbt_adapter = "dbt-duckdb"
dbt_profile_type = "duckdb"
dbt_project_dir = "transform"
dbt_manifest_path = "docs/manifest.json"
smoke_scan_paths = ["transform/models/nba", "transform/macros"]
scan_paths = ["transform"]
fail_on = "critical"
max_parse_failure_rate = 0.35

[[repo]]
name = "tuva"
url = "https://github.com/tuva-health/tuva.git"
commit = "434ff3ff70cd1cac53ba80e8291273b668bf281a"
warehouse = "duckdb"
compile_dbt = true
compile_best_effort = true
dbt_adapter = "dbt-duckdb"
dbt_profile_type = "duckdb"
dbt_project_dir = "integration_tests"
dbt_profiles_dir = "integration_tests/profiles/duckdb"
dbt_target = "ci"
dbt_preserve_manifest_paths = true
dbt_env = { DBT_MOTHERDUCK_CI_PATH = "costguard.duckdb" }
dbt_no_introspect = false
dbt_no_populate_cache = false
dbt_threads = 1
dbt_vars = "{claims_enabled: true, clinical_enabled: true, provider_attribution_enabled: true, semantic_layer_enabled: true, enable_data_quality: true, disable_dbt_invocation_autoupload: true}"
scan_paths = ["models", "macros", "snapshots", "tests"]
fail_on = "critical"
max_parse_failure_rate = 0.35
max_sql_parse_compiled_failures = 3

[[repo]]
name = "mattermost-warehouse"
required = false
url = "https://github.com/mattermost/mattermost-data-warehouse.git"
commit = "61af2424d790a8f83267f2b9ee12589fd32bcfa9"
warehouse = "snowflake"
# compile_best_effort: offline dummy profile; keeps partial manifest if warehouse auth fails
compile_dbt = true
compile_best_effort = true
dbt_adapter = "dbt-snowflake"
dbt_profile_type = "snowflake"
dbt_project_dir = "transform/snowflake-dbt"
scan_paths = ["transform/snowflake-dbt"]
smoke_scan_paths = ["transform/snowflake-dbt/models/staging"]
fail_on = "critical"
max_parse_failure_rate = 0.5

[[repo]]
name = "data-infra"
required = false
url = "https://github.com/cal-itp/data-infra.git"
commit = "5d9dd8849fa0a4830d33e6783a4d152f35fdc71f"
warehouse = "bigquery"
# compile_best_effort: offline dummy profile; keeps partial manifest if ADC auth fails
compile_dbt = true
compile_best_effort = true
dbt_adapter = "dbt-bigquery"
dbt_profile_type = "bigquery"
dbt_project_dir = "warehouse"
smoke_scan_paths = ["warehouse/models/mart"]
scan_paths = ["warehouse"]
fail_on = "critical"
max_parse_failure_rate = 0.5

[[repo]]
name = "ol-data-platform"
url = "https://github.com/mitodl/ol-data-platform.git"
commit = "e20b9148d0142b548f498d17ad4f229f357846f7"
warehouse = "trino"
# duckdb dev compile matches upstream CI; scan stays trino for dialect-accurate rules
compile_dbt = true
dbt_adapter = "dbt-duckdb"
dbt_profile_type = "duckdb"
dbt_project_dir = "src/ol_dbt"
dbt_profiles_dir = "src/ol_dbt"
dbt_target = "dev"
dbt_no_introspect = false
dbt_no_populate_cache = false
dbt_threads = 1
dbt_compile_shim = "tests/benchmarks/compile-shims/ol-data-platform.sql"
scan_paths = ["src/ol_dbt"]
smoke_scan_paths = ["src/ol_dbt/models/staging"]
fail_on = "critical"
max_parse_failure_rate = 0.35
max_sql_parse_compiled_failures = 5
