[[repo]]
name = "jaffle-shop"
url = "https://github.com/dbt-labs/jaffle-shop.git"
commit = "7be2c5838dbdeca8e915d4e46db70e910753d7f6"
warehouse = "generic"
compile_dbt = true
dbt_adapter = "dbt-duckdb"
dbt_profile_type = "duckdb"
scan_paths = ["."]
fail_on = "critical"

[[repo]]
name = "spellbook"
url = "https://github.com/duneanalytics/spellbook.git"
commit = "031a5053dd9608ce7e6b9f2d9b16dd9a2fbeba10"
warehouse = "trino"
compile_dbt = true
dbt_adapter = "dbt-trino"
dbt_profile_type = "trino"
dbt_compile_dirs = [
  "dbt_subprojects/dex",
  "dbt_subprojects/tokens",
  "dbt_subprojects/solana",
  "dbt_subprojects/daily_spellbook",
  "dbt_subprojects/hourly_spellbook",
]
smoke_compile_dirs = ["dbt_subprojects/tokens"]
smoke_scan_paths = ["dbt_macros", "dbt_subprojects/tokens"]
scan_paths = [
  "dbt_macros",
  "dbt_subprojects/dex",
  "dbt_subprojects/solana",
  "dbt_subprojects/tokens",
  "dbt_subprojects/daily_spellbook",
  "dbt_subprojects/hourly_spellbook",
]
fail_on = "critical"
max_parse_failure_rate = 0.35

[[repo]]
name = "mattermost-warehouse"
required = false
url = "https://github.com/mattermost/mattermost-data-warehouse.git"
commit = "61af2424d790a8f83267f2b9ee12589fd32bcfa9"
warehouse = "snowflake"
compile_dbt = false
dbt_adapter = "dbt-snowflake"
dbt_profile_type = "snowflake"
dbt_project_dir = "transform/snowflake-dbt"
scan_paths = ["transform/snowflake-dbt"]
smoke_scan_paths = ["transform/snowflake-dbt/models/staging"]
fail_on = "critical"
max_parse_failure_rate = 0.5
