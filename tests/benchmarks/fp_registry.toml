# Machine-readable false-positive registry.
# Each verdict = "fp" entry must have a matching corpus case with forbid_rules.
# class = "exempt" documents repo-specific-valid patterns (census-acceptable).
# class = "bug" marks residual FPs that must be eliminated via rule fixes.

