# Machine-readable false-positive registry.
# Each verdict = "fp" entry must have a matching corpus case with forbid_rules.

[[finding]]
rule = "SQLCOST005"
repo = "spellbook"
bucket = "block_time_predicate"
verdict = "fp"
corpus_case = "incremental_block_time"
notes = "block_time and related partition columns exempt incremental predicate rule"

