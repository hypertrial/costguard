<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'; base-uri 'none'">
  <title>Costguard {{ page }}</title>
  <style>body{font:15px system-ui;margin:2rem;max-width:1100px}nav a{margin-right:1rem}table{border-collapse:collapse;width:100%;margin-top:1rem}th,td{border:1px solid #ddd;padding:.5rem;text-align:left}code{font-size:.9em}.muted{color:#666}</style>
</head>
<body>
  <h1>Costguard {{ page }}</h1>
  <nav>
    <a href="/ui/organizations">Organizations</a><a href="/ui/repositories">Repositories</a>
    <a href="/ui/policies">Policies</a><a href="/ui/assignments">Assignments</a>
    <a href="/ui/exceptions">Exceptions</a><a href="/ui/tokens">Tokens</a>
    <a href="/ui/scans">Scans</a><a href="/ui/findings">Findings</a>
    <a href="/ui/costs">Costs</a><a href="/ui/reports">Reports</a><a href="/ui/audit">Audit</a>
  </nav>
  <p class="muted">Organization: {{ organization }}</p>
  <table><thead><tr><th>Metric</th><th>Value</th></tr></thead><tbody>
  {% for row in rows %}<tr><td>{{ row.0 }}</td><td>{{ row.1 }}</td></tr>{% endfor %}
  </tbody></table>
</body>
</html>
