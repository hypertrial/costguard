services:
  postgres:
    image: postgres:17.5-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: costguard
      POSTGRES_USER: costguard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - costguard-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U costguard -d costguard"]
      interval: 5s
      timeout: 5s
      retries: 20
    security_opt:
      - no-new-privileges:true

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    image: costguard-server:2.0.0
    restart: unless-stopped
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://costguard:${POSTGRES_PASSWORD}@postgres:5432/costguard
      COSTGUARD_BOOTSTRAP_SECRET: ${COSTGUARD_BOOTSTRAP_SECRET:?set COSTGUARD_BOOTSTRAP_SECRET}
      COSTGUARD_PUBLIC_URL: ${COSTGUARD_PUBLIC_URL:-http://localhost:8080}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
      GITHUB_API_URL: ${GITHUB_API_URL:-https://api.github.com}
      GITHUB_WEB_URL: ${GITHUB_WEB_URL:-https://github.com}
      RUST_LOG: ${RUST_LOG:-costguard_server=info,tower_http=info}
    ports:
      - "127.0.0.1:${COSTGUARD_PORT:-8080}:8080"
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8080/readyz"]
      interval: 10s
      timeout: 3s
      retries: 20

volumes:
  costguard-postgres:
