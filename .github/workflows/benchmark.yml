name: enterprise-benchmarks

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: enterprise-benchmarks
  cancel-in-progress: false

jobs:
  full-evidence-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: cargo build --release --locked -p costguard-cli
      - name: Run external evidence and precision gates
        env:
          COSTGUARD_BUILD_PROFILE: release
        run: python scripts/support_matrix.py --run-benchmarks --verify
