name: costguard-benchmarks

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: costguard-benchmarks
  cancel-in-progress: false

jobs:
  full-evidence-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_NET_RETRY: "3"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: Swatinem/rust-cache@7e35be21c2b94d972b1143087fabc27d7dc881ef
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.11"
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9
        with:
          tool: mdbook@0.4.40,cargo-deny@0.19.7
      - name: Install Python gate tools
        run: python -m pip install ruff==0.11.13
      - name: Run full local qualification
        run: ./scripts/ci_local.sh
      - name: Run external evidence and precision gates
        env:
          COSTGUARD_BUILD_PROFILE: release
        run: python scripts/support_matrix.py --run-benchmarks --verify
      - name: Upload benchmark and precision reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: full-benchmark-reports
          path: tests/benchmarks/reports
          if-no-files-found: error
