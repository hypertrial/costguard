name: benchmark

on:
  workflow_dispatch:
    inputs:
      target:
        description: Benchmark target to run
        required: true
        default: vendored
        type: choice
        options:
          - vendored
          - jaffle-shop
          - spellbook-smoke
          - spellbook
          - all
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  vendored:
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.target == 'vendored' || inputs.target == 'all') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - run: cargo build --release -p costguard-cli
      - run: cargo test -p costguard-core --test benchmark vendored_baselines_match
      - run: python3 scripts/benchmark_external_repo.py --all-vendored
        env:
          COSTGUARD_BUILD_PROFILE: release

  jaffle-shop:
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.target == 'jaffle-shop' || inputs.target == 'all') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.cache/costguard/benchmarks
          key: costguard-jaffle-shop-${{ hashFiles('tests/benchmarks/repos.toml') }}
      - run: cargo build --release -p costguard-cli
      - run: python3 scripts/benchmark_external_repo.py --repo jaffle-shop --cache ~/.cache/costguard/benchmarks
        env:
          COSTGUARD_BUILD_PROFILE: release
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: benchmark-jaffle-shop
          path: tests/benchmarks/reports/external__jaffle-shop.json

  spellbook-smoke:
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.target == 'spellbook-smoke' || inputs.target == 'all')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip && pip install dbt-trino
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.cache/costguard/benchmarks/.dbt-venv
          key: costguard-dbt-venv-dbt-trino-${{ hashFiles('tests/benchmarks/repos.toml') }}
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.cache/costguard/benchmarks/manifests
          key: costguard-manifests-spellbook-smoke-${{ hashFiles('tests/benchmarks/repos.toml') }}
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.cache/costguard/benchmarks
          key: costguard-spellbook-${{ hashFiles('tests/benchmarks/repos.toml') }}
      - run: cargo build --release -p costguard-cli
      - run: python3 scripts/benchmark_external_repo.py --repo spellbook --smoke --cache ~/.cache/costguard/benchmarks
        env:
          COSTGUARD_BUILD_PROFILE: release
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: benchmark-spellbook-smoke
          path: tests/benchmarks/reports/external__spellbook_smoke.json

  spellbook:
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.target == 'spellbook' || inputs.target == 'all') }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip && pip install dbt-trino
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.cache/costguard/benchmarks/.dbt-venv
          key: costguard-dbt-venv-dbt-trino-${{ hashFiles('tests/benchmarks/repos.toml') }}
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.cache/costguard/benchmarks/manifests
          key: costguard-manifests-spellbook-${{ hashFiles('tests/benchmarks/repos.toml') }}
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.cache/costguard/benchmarks
          key: costguard-spellbook-${{ hashFiles('tests/benchmarks/repos.toml') }}
      - run: cargo build --release -p costguard-cli
      - run: python3 scripts/benchmark_external_repo.py --repo spellbook --cache ~/.cache/costguard/benchmarks
        env:
          COSTGUARD_BUILD_PROFILE: release
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: benchmark-spellbook
          path: tests/benchmarks/reports/external__spellbook.json
