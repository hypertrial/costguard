name: benchmark-manual-mirror

on:
  workflow_dispatch:
    inputs:
      target:
        description: Benchmark target to run
        required: true
        default: vendored
        type: choice
        options: [vendored, jaffle-shop, spellbook-smoke, spellbook, all]

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: cargo build --release --locked -p costguard-cli
      - name: Run selected benchmark
        shell: bash
        env:
          TARGET_INPUT: ${{ inputs.target }}
          COSTGUARD_BUILD_PROFILE: release
        run: |
          case "${TARGET_INPUT}" in
            vendored) python3 scripts/benchmark_external_repo.py --all-vendored ;;
            jaffle-shop) python3 scripts/benchmark_external_repo.py --repo jaffle-shop ;;
            spellbook-smoke) python3 scripts/benchmark_external_repo.py --repo spellbook --smoke ;;
            spellbook) python3 scripts/benchmark_external_repo.py --repo spellbook ;;
            all)
              python3 scripts/benchmark_external_repo.py --all-vendored
              python3 scripts/benchmark_external_repo.py --repo jaffle-shop
              python3 scripts/benchmark_external_repo.py --repo spellbook
              ;;
          esac
