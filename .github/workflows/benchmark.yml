name: costguard-benchmarks

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: costguard-benchmarks
  cancel-in-progress: false

jobs:
  full-evidence-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"
      - run: cargo build --release --locked -p costguard-cli
      - name: Run external evidence and precision gates
        env:
          COSTGUARD_BUILD_PROFILE: release
        run: python scripts/support_matrix.py --run-benchmarks --verify
      - name: Upload benchmark and precision reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: full-benchmark-reports
          path: tests/benchmarks/reports
          if-no-files-found: error
