name: costguard-pr

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: costguard-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  costguard:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - uses: ./.github/actions/costguard
        with:
          base: origin/main
          warehouse: generic
          fail-on: high
          min-confidence: high
          format: github
          install-mode: source
          analysis-policy: standard
          block-only-new: true
          pr-comment: true
          github-token: ${{ github.token }}
