name: costguard-pr-manual-mirror

on:
  workflow_dispatch:
    inputs:
      base:
        description: Base ref for the manual PR-style scan
        required: false
        default: origin/main
        type: string

permissions:
  contents: read

jobs:
  costguard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: ./.github/actions/costguard
        with:
          base: ${{ inputs.base }}
          warehouse: generic
          dbt-adapter-package: dbt-trino
          fail-on: high
          min-confidence: high
          format: github
          install-mode: source
