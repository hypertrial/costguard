name: costguard-pr

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: costguard-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  costguard:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
      - uses: ./.github/actions/costguard
        with:
          base: origin/main
          warehouse: generic
          fail-on: high
          min-confidence: high
          format: github
          install-mode: source
          analysis-policy: standard
