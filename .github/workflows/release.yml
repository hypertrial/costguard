name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: costguard
          - os: macos-14
            target: aarch64-apple-darwin
            bin: costguard
          - os: macos-13
            target: x86_64-apple-darwin
            bin: costguard
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: costguard.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --locked -p costguard-cli --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          set -eo pipefail
          asset="costguard-${{ matrix.target }}.tar.gz"
          mkdir -p "dist/${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/${{ matrix.target }}/"
          tar -czf "$asset" -C "dist/${{ matrix.target }}" "${{ matrix.bin }}"
          shasum -a 256 "$asset" > "${asset}.sha256"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: costguard-${{ matrix.target }}
          path: |
            costguard-${{ matrix.target }}.tar.gz
            costguard-${{ matrix.target }}.tar.gz.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: |
            dist/costguard-*.tar.gz
            dist/costguard-*.tar.gz.sha256
          generate_release_notes: true
