name: release-check-manual-mirror

on:
  workflow_dispatch:
    inputs:
      version:
        description: Workspace version to qualify
        required: true
        default: 1.0.0
        type: string

permissions:
  contents: read

jobs:
  qualify:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: cargo install mdbook --version 0.4.40 --locked
      - run: cargo install cargo-deny --version 0.19.7 --locked
      - env:
          VERSION_INPUT: ${{ inputs.version }}
        run: python3 scripts/release_check.py --version "${VERSION_INPUT}"
