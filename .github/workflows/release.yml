name: release-v2

on:
  push:
    tags: ["v2.*"]

permissions:
  actions: read
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  qualify:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      prerelease: ${{ steps.release.outputs.prerelease }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
      - name: Require successful exact-SHA push CI
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/verify_ci_history.py --repository "${GITHUB_REPOSITORY}" --sha "$(git rev-parse HEAD)"
      - name: Verify SSH-signed annotated tag
        env:
          SSH_ALLOWED_SIGNERS: ${{ vars.RELEASE_SSH_ALLOWED_SIGNERS }}
        run: |
          test -n "${SSH_ALLOWED_SIGNERS}"
          printf '%s\n' "${SSH_ALLOWED_SIGNERS}" > "${RUNNER_TEMP}/allowed_signers"
          git config gpg.format ssh
          git config gpg.ssh.allowedSignersFile "${RUNNER_TEMP}/allowed_signers"
          test "$(git cat-file -t "refs/tags/${GITHUB_REF_NAME}")" = tag
          git verify-tag "${GITHUB_REF_NAME}"
      - id: release
        name: Validate v2 version
        run: |
          [[ "${GITHUB_REF_NAME}" =~ ^v2\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]
          VERSION="${GITHUB_REF_NAME#v}"
          test "${VERSION}" = "$(python -c 'import tomllib; print(tomllib.load(open("Cargo.toml", "rb"))["workspace"]["package"]["version"])')"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
          if [[ "${VERSION}" == *-* ]]; then
            echo "prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            echo "prerelease=false" >> "${GITHUB_OUTPUT}"
          fi
      - run: python scripts/release_check.py --version "${{ steps.release.outputs.version }}" --trust-push-ci
      - run: python scripts/generate_sbom.py
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-evidence
          path: |
            dist/release/release-check.json
            dist/release/costguard.cdx.json
          if-no-files-found: error

  build:
    needs: qualify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: macos-15
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: windows-2025
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    env:
      CARGO_INCREMENTAL: "0"
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@baf1a810e98b6a3001d0d7234864ed75a17c42fb
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-evidence
          path: dist/release
      - name: Build, package, and smoke
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ needs.qualify.outputs.version }}
        run: |
          cargo build --release --locked -p costguard-cli --target "${TARGET}"
          export SOURCE_DATE_EPOCH="$(git show -s --format=%ct HEAD)"
          python scripts/package_release_target.py --target "${TARGET}" --version "${VERSION}"
      - uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: dist/release/costguard-${{ matrix.target }}.tar.gz
      - uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e
        with:
          subject-path: dist/release/costguard-${{ matrix.target }}.tar.gz
          sbom-path: dist/release/costguard.cdx.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/release/costguard-${{ matrix.target }}.tar.gz
            dist/release/costguard-${{ matrix.target }}.tar.gz.sha256
            dist/release/smoke-${{ matrix.target }}.json
          if-no-files-found: error

  publish:
    needs: [qualify, build]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: dist/release
          merge-multiple: true
      - name: Verify exact inventory and consumer behavior
        env:
          VERSION: ${{ needs.qualify.outputs.version }}
        run: |
          python scripts/verify_release_inventory.py --version "${VERSION}"
          python scripts/release_consumer_smoke.py --version "${VERSION}"
      - name: Publish immutable exact release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.qualify.outputs.version }}
          PRERELEASE: ${{ needs.qualify.outputs.prerelease }}
        run: |
          args=("v${VERSION}" dist/release/* --verify-tag --title "Costguard v${VERSION}" --generate-notes)
          if [[ "${PRERELEASE}" == "true" ]]; then
            args+=(--prerelease)
          fi
          gh release create "${args[@]}"

  promote:
    if: needs.qualify.outputs.prerelease == 'false'
    needs: [qualify, publish]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    environment: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Move compatible major tag after publish verification
        run: |
          git tag -f v2 "$(git rev-parse HEAD)"
          git push origin refs/tags/v2 --force
