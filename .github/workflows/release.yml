name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: costguard
          - os: macos-14
            target: aarch64-apple-darwin
            bin: costguard
          - os: macos-13
            target: x86_64-apple-darwin
            bin: costguard
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: costguard.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --locked -p costguard-cli --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          set -eo pipefail
          asset="costguard-${{ matrix.target }}.tar.gz"
          mkdir -p "dist/${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/${{ matrix.target }}/"
          tar -czf "$asset" -C "dist/${{ matrix.target }}" "${{ matrix.bin }}"
          shasum -a 256 "$asset" > "${asset}.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: costguard-${{ matrix.target }}
          path: |
            costguard-${{ matrix.target }}.tar.gz
            costguard-${{ matrix.target }}.tar.gz.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/costguard-*.tar.gz
            dist/costguard-*.tar.gz.sha256
          generate_release_notes: true
