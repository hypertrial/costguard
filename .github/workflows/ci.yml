name: ci-manual-mirror

on:
  workflow_dispatch:
    inputs:
      spellbook-smoke:
        description: Include the pinned Spellbook smoke benchmark
        required: false
        default: true
        type: boolean
      precision:
        description: Include the Spellbook precision gate when cache is available
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  local-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: cargo install mdbook --version 0.4.40 --locked
      - run: cargo install cargo-deny --version 0.19.7 --locked
      - run: pip install ruff
      - if: ${{ inputs.spellbook-smoke && inputs.precision }}
        run: ./scripts/ci_local.sh --spellbook-smoke --precision
      - if: ${{ inputs.spellbook-smoke && !inputs.precision }}
        run: ./scripts/ci_local.sh --spellbook-smoke
      - if: ${{ !inputs.spellbook-smoke && inputs.precision }}
        run: ./scripts/ci_local.sh --precision
      - if: ${{ !inputs.spellbook-smoke && !inputs.precision }}
        run: ./scripts/ci_local.sh
