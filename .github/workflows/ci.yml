name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
      - name: Install qualification tools
        run: |
          python -m pip install ruff==0.11.13
          cargo install mdbook --version 0.4.40 --locked
          cargo install cargo-deny --version 0.19.7 --locked
      - name: Run required PR gate
        run: ./scripts/ci_local.sh
      - name: Upload qualification reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: pr-gate-reports
          path: tests/benchmarks/reports
          if-no-files-found: warn

  scale:
    needs: pr-gate
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
      - run: cargo build --release --locked -p costguard-cli
      - run: python scripts/scale_check.py
      - name: Upload scale report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: scale-report
          path: tests/benchmarks/reports/scale.json
          if-no-files-found: error

  spellbook-smoke:
    if: github.event_name != 'pull_request'
    needs: pr-gate
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
      - run: cargo build --release --locked -p costguard-cli
      - env:
          COSTGUARD_BUILD_PROFILE: release
        run: python scripts/benchmark_external_repo.py --repo spellbook --smoke
      - name: Upload Spellbook smoke report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: spellbook-smoke-report
          path: tests/benchmarks/reports/external__spellbook_smoke.json
          if-no-files-found: error
