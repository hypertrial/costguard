name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - name: Install qualification tools
        run: |
          python -m pip install ruff==0.11.13
          cargo install mdbook --version 0.4.40 --locked
          cargo install cargo-deny --version 0.19.7 --locked
      - name: Run required PR gate
        run: ./scripts/ci_local.sh

  scale:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: pr-gate
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: cargo build --release --locked -p costguard-cli
      - run: python scripts/scale_check.py

  spellbook-smoke:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: pr-gate
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - run: cargo build --release --locked -p costguard-cli
      - env:
          COSTGUARD_BUILD_PROFILE: release
        run: python scripts/benchmark_external_repo.py --repo spellbook --smoke
