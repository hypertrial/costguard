name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_NET_RETRY: "3"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: Swatinem/rust-cache@7e35be21c2b94d972b1143087fabc27d7dc881ef
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"
      - name: Install Python gate tools
        run: python -m pip install ruff==0.11.13
      - name: Run required PR gate
        run: ./scripts/ci_local.sh --fast
      - name: Run scale gate
        run: python scripts/scale_check.py
      - name: Upload qualification reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: pr-gate-reports
          path: tests/benchmarks/reports
          if-no-files-found: warn
