name: Costguard PR Check
description: Run costguard pr against changed SQL/dbt files

inputs:
  base:
    description: Git base ref for changed-file detection
    required: false
    default: origin/main
  warehouse:
    description: Warehouse platform for rule context
    required: false
    default: generic
  manifest:
    description: Optional explicit dbt manifest path (defaults to target/manifest.json when present)
    required: false
    default: ""
  fail-on:
    description: Minimum severity that fails the check
    required: false
    default: high
  baseline:
    description: Finding baseline JSON path for grandfathering known findings
    required: false
    default: ""
  min-confidence:
    description: Minimum diagnostic confidence required to fail (low, medium/med, high). Empty omits the flag.
    required: false
    default: ""
  format:
    description: Output format (github, markdown, json, text, sarif)
    required: false
    default: github
  install-mode:
    description: Install mode for the costguard CLI (release or source)
    required: false
    default: release
  version:
    description: Exact Costguard release version override (defaults to the Action checkout workspace version)
    required: false
    default: ""
  working-directory:
    description: Directory containing the dbt project
    required: false
    default: .
  analysis-policy:
    description: Analysis completeness policy (standard or strict)
    required: false
    default: standard
  verify-attestation:
    description: Verify the GitHub artifact attestation before extracting a release archive
    required: false
    default: "true"
  cost:
    description: Enable cost estimates (uses [cost] in costguard.toml when present)
    required: false
    default: "false"
  fail-on-cost-delta:
    description: Fail when addressable finding savings p50 on new findings exceeds this USD threshold
    required: false
    default: ""
  policy:
    description: Optional signed policy bundle path
    required: false
    default: ""
  trust-store:
    description: Public trust store used to verify the signed policy bundle
    required: false
    default: ""
  policy-organization:
    description: Organization slug for signed policy resolution
    required: false
    default: ""
  policy-team:
    description: Optional team slug for signed policy resolution
    required: false
    default: ""
  policy-repository:
    description: Repository slug for signed policy resolution
    required: false
    default: ""
  receipt-path:
    description: Optional path for the JSON v4 PR receipt
    required: false
    default: ""
  compare-receipt:
    description: Optional prior JSON v4 receipt used to calculate trend deltas
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install Rust toolchain
      if: inputs.install-mode == 'source'
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

    - name: Install costguard
      shell: bash
      env:
        INSTALL_MODE_INPUT: ${{ inputs.install-mode }}
        VERSION_INPUT: ${{ inputs.version }}
        VERIFY_ATTESTATION_INPUT: ${{ inputs.verify-attestation }}
      run: |
        PYTHON="$(command -v python3 || command -v python)"
        "${PYTHON}" "${GITHUB_ACTION_PATH}/scripts/costguard_action.py" install \
          --mode "${INSTALL_MODE_INPUT}" \
          --version "${VERSION_INPUT}"

    - name: Run costguard pr
      shell: bash
      env:
        BASE_INPUT: ${{ inputs.base }}
        WAREHOUSE_INPUT: ${{ inputs.warehouse }}
        FAIL_ON_INPUT: ${{ inputs.fail-on }}
        FORMAT_INPUT: ${{ inputs.format }}
        MIN_CONFIDENCE_INPUT: ${{ inputs.min-confidence }}
        BASELINE_INPUT: ${{ inputs.baseline }}
        COST_INPUT: ${{ inputs.cost }}
        FAIL_ON_COST_DELTA_INPUT: ${{ inputs.fail-on-cost-delta }}
        MANIFEST_INPUT: ${{ inputs.manifest }}
        WORKING_DIRECTORY_INPUT: ${{ inputs.working-directory }}
        ANALYSIS_POLICY_INPUT: ${{ inputs.analysis-policy }}
        POLICY_BUNDLE_INPUT: ${{ inputs.policy }}
        TRUST_STORE_INPUT: ${{ inputs.trust-store }}
        POLICY_ORGANIZATION_INPUT: ${{ inputs.policy-organization }}
        POLICY_TEAM_INPUT: ${{ inputs.policy-team }}
        POLICY_REPOSITORY_INPUT: ${{ inputs.policy-repository }}
        RECEIPT_PATH_INPUT: ${{ inputs.receipt-path }}
        COMPARE_RECEIPT_INPUT: ${{ inputs.compare-receipt }}
      run: |
        PYTHON="$(command -v python3 || command -v python)"
        "${PYTHON}" "${GITHUB_ACTION_PATH}/scripts/costguard_action.py" run
