name: Costguard PR Check
description: Run costguard pr against changed SQL/dbt files

inputs:
  base:
    description: Git base ref for changed-file detection
    required: false
    default: origin/main
  warehouse:
    description: Warehouse platform for rule context
    required: false
    default: generic
  fail-on:
    description: Minimum severity that fails the check
    required: false
    default: high
  min-confidence:
    description: Minimum diagnostic confidence required to fail (low, medium/med, high). Empty omits the flag.
    required: false
    default: ""
  format:
    description: Output format (github, markdown, json, text)
    required: false
    default: github
  install-mode:
    description: Install mode for the costguard CLI (release or source)
    required: false
    default: release
  version:
    description: Costguard release version to install when install-mode=release (defaults to action ref when available)
    required: false
    default: ""
  manifest:
    description: Optional explicit dbt manifest path
    required: false
    default: ""
  working-directory:
    description: Directory containing the dbt project
    required: false
    default: .
  compile-dbt:
    description: Run dbt compile before scan when dbt_project.yml is present
    required: false
    default: "true"
  dbt-target:
    description: dbt --target value for compile
    required: false
    default: dev
  dbt-project-dir:
    description: Directory containing dbt_project.yml (defaults to working-directory)
    required: false
    default: ""
  dbt-profiles-dir:
    description: Directory for profiles.yml (defaults to dbt-project-dir)
    required: false
    default: ""
  dbt-adapter-package:
    description: pip package for dbt compile (for example dbt-trino or dbt-postgres)
    required: false
    default: dbt-trino
  dbt-profile-type:
    description: Dummy profiles.yml adapter type (defaults from dbt-adapter-package when empty)
    required: false
    default: ""
  dbt-compile-dirs:
    description: Comma or newline separated dbt subproject paths to compile and merge
    required: false
    default: ""
  manifest-output:
    description: Path for merged manifest output relative to working-directory
    required: false
    default: target/manifest.json
  dbt-requirements-file:
    description: Optional pip requirements file for dbt dependencies
    required: false
    default: ""
  dbt-constraints-file:
    description: Optional pip constraints file for dbt dependencies
    required: false
    default: ""
  dbt-vars:
    description: Optional YAML string passed to dbt compile --vars
    required: false
    default: ""
  fail-on-deps-failure:
    description: Fail when dbt deps fails instead of warning and continuing
    required: false
    default: "false"
  use-existing-manifest:
    description: Skip dbt compile and use manifest-output or manifest input as an existing artifact
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Install Rust toolchain
      if: inputs.install-mode == 'source'
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

    - name: Cache cargo build
      if: inputs.install-mode == 'source'
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-costguard-action-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-costguard-action-

    - name: Build costguard CLI
      if: inputs.install-mode == 'source'
      shell: bash
      run: |
        cargo build --release -p costguard-cli --locked
        echo "${GITHUB_WORKSPACE}/target/release" >> "$GITHUB_PATH"

    - name: Install costguard release
      if: inputs.install-mode == 'release'
      shell: bash
      env:
        VERSION_INPUT: ${{ inputs.version }}
        ACTION_REF: ${{ github.action_ref }}
      run: |
        set -eo pipefail
        version="${VERSION_INPUT:-${ACTION_REF:-}}"
        if [ -z "$version" ] || [ "$version" = "__run" ]; then
          echo "A release version is required when install-mode=release." >&2
          exit 2
        fi
        os="$(uname -s)"
        arch="$(uname -m)"
        case "${os}-${arch}" in
          Linux-x86_64) target="x86_64-unknown-linux-gnu" ;;
          Darwin-arm64) target="aarch64-apple-darwin" ;;
          Darwin-x86_64) target="x86_64-apple-darwin" ;;
          MINGW*-x86_64|MSYS*-x86_64) target="x86_64-pc-windows-msvc" ;;
          *) echo "Unsupported runner platform: ${os}-${arch}" >&2; exit 2 ;;
        esac
        asset="costguard-${target}.tar.gz"
        base_url="https://github.com/hypertrial/costguard/releases/download/${version}"
        tmp="$(mktemp -d)"
        curl -fsSL "${base_url}/${asset}" -o "${tmp}/${asset}"
        curl -fsSL "${base_url}/${asset}.sha256" -o "${tmp}/${asset}.sha256"
        (cd "$tmp" && shasum -a 256 -c "${asset}.sha256")
        mkdir -p "${RUNNER_TEMP}/costguard-bin"
        tar -xzf "${tmp}/${asset}" -C "${RUNNER_TEMP}/costguard-bin"
        echo "${RUNNER_TEMP}/costguard-bin" >> "$GITHUB_PATH"

    - name: Set up Python
      if: inputs.compile-dbt == 'true' && inputs.use-existing-manifest != 'true'
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
      with:
        python-version: "3.11"

    - name: Compile dbt project
      if: inputs.compile-dbt == 'true' && inputs.use-existing-manifest != 'true'
      shell: bash
      env:
        DBT_ADAPTER_PACKAGE: ${{ inputs.dbt-adapter-package }}
        DBT_TARGET: ${{ inputs.dbt-target }}
        DBT_PROJECT_DIR_INPUT: ${{ inputs.dbt-project-dir }}
        DBT_PROFILES_DIR_INPUT: ${{ inputs.dbt-profiles-dir }}
        DBT_PROFILE_TYPE_INPUT: ${{ inputs.dbt-profile-type }}
        DBT_COMPILE_DIRS_INPUT: ${{ inputs.dbt-compile-dirs }}
        DBT_REQUIREMENTS_FILE_INPUT: ${{ inputs.dbt-requirements-file }}
        DBT_CONSTRAINTS_FILE_INPUT: ${{ inputs.dbt-constraints-file }}
        DBT_VARS_INPUT: ${{ inputs.dbt-vars }}
        FAIL_ON_DEPS_FAILURE_INPUT: ${{ inputs.fail-on-deps-failure }}
        MANIFEST_OUTPUT_INPUT: ${{ inputs.manifest-output }}
        WORKING_DIRECTORY_INPUT: ${{ inputs.working-directory }}
      run: |
        set -eo pipefail
        repo_root="${GITHUB_WORKSPACE}"
        workdir="${WORKING_DIRECTORY_INPUT:-.}"
        if [ "${workdir}" != "." ]; then
          repo_root="${GITHUB_WORKSPACE}/${workdir}"
        fi
        project_dir="${DBT_PROJECT_DIR_INPUT:-.}"
        compile_dirs="${DBT_COMPILE_DIRS_INPUT}"
        if [ -z "${compile_dirs}" ] && [ ! -f "${repo_root}/${project_dir}/dbt_project.yml" ]; then
          echo "No dbt_project.yml in ${repo_root}/${project_dir}; skipping dbt compile."
          exit 0
        fi

        python -m pip install --upgrade pip
        install_args=()
        if [ -n "${DBT_CONSTRAINTS_FILE_INPUT}" ]; then
          install_args+=(-c "${repo_root}/${DBT_CONSTRAINTS_FILE_INPUT}")
        fi
        if [ -n "${DBT_REQUIREMENTS_FILE_INPUT}" ]; then
          install_args+=(-r "${repo_root}/${DBT_REQUIREMENTS_FILE_INPUT}")
        fi
        install_args+=("${DBT_ADAPTER_PACKAGE}")
        python -m pip install "${install_args[@]}"

        args=(
          python3 "${GITHUB_WORKSPACE}/scripts/dbt_compile_for_costguard.py"
          --checkout "${repo_root}"
          --adapter-package "${DBT_ADAPTER_PACKAGE}"
          --target "${DBT_TARGET}"
          --manifest-out "${MANIFEST_OUTPUT_INPUT}"
          --use-system-dbt
        )
        if [ -n "${DBT_PROFILE_TYPE_INPUT}" ]; then
          args+=(--profile-type "${DBT_PROFILE_TYPE_INPUT}")
        fi
        if [ -n "${DBT_PROFILES_DIR_INPUT}" ]; then
          args+=(--profiles-dir "${DBT_PROFILES_DIR_INPUT}")
        fi
        if [ -n "${compile_dirs}" ]; then
          args+=(--compile-dirs "${compile_dirs}")
        else
          args+=(--project-dir "${project_dir}")
        fi
        if [ -n "${DBT_VARS_INPUT}" ]; then
          args+=(--vars "${DBT_VARS_INPUT}")
        fi
        if [ "${FAIL_ON_DEPS_FAILURE_INPUT}" = "true" ]; then
          args+=(--fail-on-deps-failure)
        fi
        "${args[@]}"

    - name: Run costguard pr
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        BASE_INPUT: ${{ inputs.base }}
        WAREHOUSE_INPUT: ${{ inputs.warehouse }}
        FAIL_ON_INPUT: ${{ inputs.fail-on }}
        FORMAT_INPUT: ${{ inputs.format }}
        MIN_CONFIDENCE_INPUT: ${{ inputs.min-confidence }}
        MANIFEST_INPUT: ${{ inputs.manifest }}
        MANIFEST_OUTPUT_INPUT: ${{ inputs.manifest-output }}
      run: |
        set -eo pipefail
        args=(
          pr
          --base "${BASE_INPUT}"
          --warehouse "${WAREHOUSE_INPUT}"
          --fail-on "${FAIL_ON_INPUT}"
          --format "${FORMAT_INPUT}"
        )
        if [ -n "${MIN_CONFIDENCE_INPUT}" ]; then
          args+=(--min-confidence "${MIN_CONFIDENCE_INPUT}")
        fi
        manifest="${MANIFEST_INPUT}"
        if [ -z "${manifest}" ] && [ -f "${MANIFEST_OUTPUT_INPUT}" ]; then
          manifest="${MANIFEST_OUTPUT_INPUT}"
        fi
        if [ -n "${manifest}" ]; then
          args+=(--manifest "${manifest}")
        fi
        set +e
        output="$(costguard "${args[@]}")"
        status=$?
        printf '%s\n' "$output"
        if [ "${FORMAT_INPUT}" = "markdown" ] && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
          printf '%s\n' "$output" >> "$GITHUB_STEP_SUMMARY"
        fi
        exit "$status"
